apiVersion: v1
kind: Pod
metadata:
  name: short-app
  labels:
    components: frontend
    app: short-app
spec:
  containers:
    - name: short-app
      image: antonlarichev/short-app:latest
      ports:
        - containerPort: 80
      resources:
        limits:
          memory: "128Mi"
          cpu: "500m"
